<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Influencer Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07070d;--s1:#111118;--s2:#18181f;--s3:#202028;--b:rgba(255,255,255,.07);--acc:#7c6aff;--a2:#ff6b9d;--tx:#eeeef5;--tx2:#8888aa;--tx3:#44445a;--pos:#00e5a0;--neu:#7c6aff;--neg:#ff4d6d;--gld:#ffd166;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;background-image:radial-gradient(ellipse 80% 60% at 15% -15%,rgba(124,106,255,.09),transparent 55%),radial-gradient(ellipse 60% 50% at 85% 110%,rgba(255,107,157,.07),transparent 55%);}
h1,h2,h3,h4{font-family:'Syne',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px;}
.app{display:flex;min-height:100vh;}
.sidebar{width:240px;min-width:240px;background:var(--s1);border-right:1px solid var(--b);padding:20px 16px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.main-col{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-icon{width:34px;height:34px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,var(--acc),var(--a2));display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;line-height:1.1;}
.logo-sub{font-size:9px;color:var(--tx2);letter-spacing:2px;text-transform:uppercase;}
.s-lbl{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:5px;}
.si{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:8px 11px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color .2s;margin-bottom:6px;}
.si:focus{border-color:var(--acc);}.si::placeholder{color:var(--tx3);}
.sbtn{background:linear-gradient(135deg,var(--acc),var(--a2));border:none;border-radius:7px;padding:8px 0;color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;font-size:13px;width:100%;transition:opacity .2s;}
.sbtn:hover{opacity:.85;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.cb{padding:7px 4px;border-radius:6px;border:1px solid var(--b);background:transparent;color:var(--tx2);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .15s;text-align:center;}
.cb:hover{border-color:var(--acc);color:var(--acc);}.cb.on{background:rgba(124,106,255,.15);border-color:var(--acc);color:var(--acc);font-weight:600;}
.tk-val{color:var(--acc);font-weight:700;font-size:14px;}
input[type=range]{width:100%;accent-color:var(--acc);margin-top:5px;}
.sfoot{margin-top:auto;padding:11px 12px;background:var(--s2);border-radius:9px;font-size:11px;color:var(--tx2);line-height:1.8;border:1px solid var(--b);}
.sfoot strong{color:var(--tx);}
.nav{display:flex;border-bottom:1px solid var(--b);background:var(--s1);padding:0 24px;flex-shrink:0;}
.ntab{padding:13px 18px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.ntab:hover{color:var(--tx);}.ntab.on{color:var(--acc);border-bottom-color:var(--acc);}
.nav-right{margin-left:auto;display:flex;align-items:center;padding:0 16px;font-size:11px;color:var(--tx2);}
.page{padding:22px 28px;flex:1;overflow-y:auto;}
.st{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:18px;}
.st.ok{background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.2);color:var(--pos);}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.mgrp{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:10px;margin-bottom:20px;}
.mc{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:14px 15px;}
.mc.a{border-color:rgba(124,106,255,.3);background:rgba(124,106,255,.05);}
.mc.g{border-color:rgba(0,229,160,.3);background:rgba(0,229,160,.04);}
.mc.p{border-color:rgba(255,107,157,.3);background:rgba(255,107,157,.04);}
.mc.d{border-color:rgba(255,209,102,.3);background:rgba(255,209,102,.04);}
.mc.nu{border-color:rgba(124,106,255,.2);background:rgba(124,106,255,.03);}
.mc-l{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}
.mc-v{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
.mc-s{font-size:10px;color:var(--tx2);margin-top:3px;}
.cg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:20px;}
.cc{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:16px 18px;}
.cc-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px;}
.cc-sub{font-size:10px;color:var(--tx2);margin-bottom:12px;line-height:1.5;}
.cw{position:relative;height:200px;}.cw-lg{position:relative;height:250px;}
.tc{background:var(--s1);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.tc-head{padding:12px 16px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;}
.tc-title{font-size:14px;font-weight:700;}.tc-sub{font-size:10px;color:var(--tx2);margin-top:2px;}
.tc-badge{font-size:9px;padding:3px 9px;border-radius:20px;background:rgba(124,106,255,.15);color:var(--acc);font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
.tscroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:8px 13px;text-align:left;font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--b);background:var(--s2);font-weight:700;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--b);transition:background .12s;cursor:pointer;}
tbody tr:hover{background:var(--s2);}tbody tr:last-child{border-bottom:none;}
tbody td{padding:9px 13px;font-size:12px;}tbody tr.sel{background:rgba(124,106,255,.1);}tbody tr.nc{cursor:default;}
.sec-h{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
.sec-t{font-size:17px;font-weight:700;}.sec-s{font-size:12px;color:var(--tx2);}
.divider{border:none;border-top:1px solid var(--b);margin:22px 0;}
.rk{width:21px;height:21px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--s2);}
.rk.r1{background:rgba(255,209,102,.2);color:var(--gld);}.rk.r2{background:rgba(200,200,200,.12);color:#bbb;}.rk.r3{background:rgba(205,127,50,.14);color:#cd7f32;}
.sp{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.sp.Positive{background:rgba(0,229,160,.15);color:var(--pos);}.sp.Neutral{background:rgba(124,106,255,.15);color:var(--neu);}.sp.Negative{background:rgba(255,77,109,.15);color:var(--neg);}
.tier{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.tier.nano{background:rgba(255,255,255,.07);color:var(--tx2);}.tier.micro{background:rgba(0,229,160,.12);color:var(--pos);}.tier.macro{background:rgba(124,106,255,.15);color:var(--acc);}.tier.mega{background:rgba(255,209,102,.15);color:var(--gld);}
.sbar{display:flex;align-items:center;gap:6px;}.sb{height:3px;border-radius:2px;background:rgba(124,106,255,.2);flex:1;min-width:60px;}.sbf{height:100%;border-radius:2px;background:var(--acc);}.sn{font-size:10px;color:var(--tx2);min-width:34px;text-align:right;}
.pcard{background:linear-gradient(135deg,var(--s1),rgba(124,106,255,.06));border:1px solid rgba(124,106,255,.2);border-radius:14px;padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.pav{width:52px;height:52px;border-radius:13px;flex-shrink:0;background:linear-gradient(135deg,var(--acc),var(--a2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.pname{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;}.pmeta{font-size:11px;color:var(--tx2);margin-top:3px;}
.ptags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--s2);color:var(--tx2);border:1px solid var(--b);}
.tag.cat{background:rgba(124,106,255,.1);color:var(--acc);border-color:rgba(124,106,255,.3);}.tag.ver{background:rgba(0,229,160,.1);color:var(--pos);border-color:rgba(0,229,160,.3);}
.back-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:7px;border:1px solid var(--b);background:transparent;color:var(--tx2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;transition:all .15s;margin-bottom:18px;width:fit-content;}
.back-btn:hover{border-color:var(--acc);color:var(--acc);}
.insight{background:rgba(124,106,255,.05);border:1px solid rgba(124,106,255,.15);border-radius:10px;padding:12px 16px;margin-bottom:18px;font-size:12px;color:var(--tx2);line-height:1.7;}
.insight strong{color:var(--acc);}
.nf-box{background:rgba(255,209,102,.05);border:1px solid rgba(255,209,102,.25);border-radius:14px;padding:24px;margin-bottom:22px;text-align:center;}
.nf-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--gld);margin-bottom:8px;}
.nf-sub{font-size:13px;color:var(--tx2);line-height:1.7;}
.empty{padding:40px;text-align:center;color:var(--tx2);font-size:13px;line-height:1.7;}
.spinner{width:32px;height:32px;border:3px solid var(--b);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.full-center{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;}
.help-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px;}
.hcard{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:16px 18px;}
.hcard-t{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.hcard-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.hcard-body{font-size:12px;color:var(--tx2);line-height:1.7;}.hcard-ex{margin-top:8px;font-size:11px;padding:7px 10px;background:var(--s2);border-radius:6px;color:var(--tx2);border-left:2px solid var(--acc);}
.donut-wrap{display:flex;align-items:center;gap:18px;}.d-leg{display:flex;flex-direction:column;gap:7px;flex:1;}
.dl-row{display:flex;align-items:center;gap:6px;font-size:11px;}.dl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;
const BASE='https://raw.githubusercontent.com/khushali259/instagram-influencer-dashboard/main/data';
const URLS={users:`${BASE}/user_vectors_v2.csv`,simU:`${BASE}/user_similarity_topk.csv`,simI:`${BASE}/user_item_topk.csv`,posts:`${BASE}/post_vectors_slim.csv`};
const CATS=['beauty','family','fashion','fitness','food','interior','other','pet','travel'];
const ICO={beauty:'💄',family:'👨‍👩‍👧',fashion:'👗',fitness:'💪',food:'🍜',interior:'🏠',other:'✨',pet:'🐾',travel:'✈️'};
const fN=n=>{n=parseFloat(n)||0;if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.round(n).toLocaleString();};
const fP=n=>((parseFloat(n)||0)*100).toFixed(1)+'%';
const fS=n=>(parseFloat(n)||0).toFixed(3);
const cap=s=>s?s[0].toUpperCase()+s.slice(1):'';
const norm=s=>(s||'').toLowerCase().trim();
const csv=url=>new Promise((ok,err)=>Papa.parse(url,{download:true,header:true,skipEmptyLines:true,complete:r=>ok(r.data),error:err}));
const meanOf=users=>{if(!users.length)return{};const ks=Object.keys(users[0]).filter(k=>!isNaN(parseFloat(users[0][k])));const m={};ks.forEach(k=>m[k]=(users.reduce((s,u)=>s+(parseFloat(u[k])||0),0)/users.length).toString());return m;};
const tierOf=f=>{f=parseFloat(f)||0;if(f>=1e6)return'mega';if(f>=1e5)return'macro';if(f>=1e4)return'micro';return'nano';};
const Rank=({r})=><span className={`rk ${r===1?'r1':r===2?'r2':r===3?'r3':''}`}>{r}</span>;
const Pill=({v})=><span className={`sp ${v||'Neutral'}`}>{v||'Neutral'}</span>;
const Tier=({f})=><span className={`tier ${tierOf(f)}`}>{tierOf(f)}</span>;
const SBar=({v,max=0.6})=>{const p=Math.min(100,(parseFloat(v)||0)/max*100);return <div className="sbar"><div className="sb"><div className="sbf" style={{width:p+'%'}}/></div><span className="sn">{fS(v)}</span></div>;};

function DonutChart({pos,neu,neg}){const ref=useRef();const ch=useRef();useEffect(()=>{if(!ref.current)return;ch.current?.destroy();ch.current=new Chart(ref.current,{type:'doughnut',data:{labels:['Positive','Neutral','Negative'],datasets:[{data:[+(pos*100).toFixed(1),+(neu*100).toFixed(1),+(neg*100).toFixed(1)],backgroundColor:['rgba(0,229,160,.82)','rgba(124,106,255,.72)','rgba(255,77,109,.82)'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${parseFloat(c.raw).toFixed(1)}%`}}}}});return()=>ch.current?.destroy();},[pos,neu,neg]);return(<div className="donut-wrap"><div style={{width:100,height:100,flexShrink:0}}><canvas ref={ref}/></div><div className="d-leg">{[['var(--pos)','Positive',pos],['var(--neu)','Neutral',neu],['var(--neg)','Negative',neg]].map(([col,lbl,val])=>(<div className="dl-row" key={lbl}><div className="dl-dot" style={{background:col}}/><span style={{color:'var(--tx2)',flex:1}}>{lbl}</span><strong style={{color:col}}>{fP(val)}</strong></div>))}</div></div>);}

function StyleBar({user,mean}){const ref=useRef();const ch=useRef();useEffect(()=>{if(!ref.current||!user||!mean)return;ch.current?.destroy();const rows=[{l:'Hashtags per post',k:'avg_cap_num_hashtags',s:1},{l:'Mentions per post',k:'avg_cap_num_mentions',s:1},{l:'Exclamations',k:'avg_cap_num_exclamation',s:1},{l:'Caption length ÷ 10',k:'avg_cap_char_len',s:.1},{l:'Caption positivity × 10',k:'avg_cap_vader_compound',s:10},{l:'Subjectivity × 10',k:'avg_cap_tb_subjectivity',s:10}];ch.current=new Chart(ref.current,{type:'bar',data:{labels:rows.map(r=>r.l),datasets:[{label:`@${user.account_username}`,data:rows.map(r=>+((parseFloat(user[r.k])||0)*r.s).toFixed(2)),backgroundColor:'rgba(124,106,255,.75)',borderRadius:4},{label:'Category average',data:rows.map(r=>+((parseFloat(mean[r.k])||0)*r.s).toFixed(2)),backgroundColor:'rgba(255,255,255,.1)',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8888aa',font:{size:10}}}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888aa'}},y:{grid:{display:false},ticks:{color:'#8888aa',font:{size:10}}}}}});return()=>ch.current?.destroy();},[user,mean]);return <div className="cw"><canvas ref={ref}/></div>;}

function DistChart({users,hl}){const ref=useRef();const ch=useRef();useEffect(()=>{if(!ref.current||!users?.length)return;ch.current?.destroy();const B=20,step=1/B,counts=Array(B).fill(0),clr=Array(B).fill('rgba(124,106,255,.5)');users.forEach(u=>{const i=Math.min(B-1,Math.floor((parseFloat(u.avg_pct_positive_predicted)||0)/step));counts[i]++;});if(hl){const hi=Math.min(B-1,Math.floor((parseFloat(hl.avg_pct_positive_predicted)||0)/step));clr[hi]='rgba(0,229,160,.9)';}ch.current=new Chart(ref.current,{type:'bar',data:{labels:Array.from({length:B},(_,i)=>Math.round(i*step*100)+'%'),datasets:[{data:counts,backgroundColor:clr,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:t=>`${t[0].label} – ${Math.round(+t[0].label.replace('%','')+5)}% positive`,label:c=>`${c.raw} influencers`}}},scales:{y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888aa'},title:{display:true,text:'Number of influencers',color:'#8888aa',font:{size:10}}},x:{grid:{display:false},ticks:{color:'#8888aa',maxTicksLimit:6},title:{display:true,text:'% of comments that are Positive',color:'#8888aa',font:{size:10}}}}}});return()=>ch.current?.destroy();},[users,hl]);return <div className="cw"><canvas ref={ref}/></div>;}

function ScatterChart({users,hl}){const ref=useRef();const ch=useRef();useEffect(()=>{if(!ref.current||!users?.length)return;ch.current?.destroy();const g={Positive:[],Neutral:[],Negative:[]};users.forEach(u=>{const s=u.user_dominant_sentiment||'Neutral';if(g[s])g[s].push({x:Math.log1p(parseFloat(u.followers)||0),y:Math.log1p(parseFloat(u.avg_like_count)||0),label:u.account_username});});const clr={Positive:'rgba(0,229,160,.5)',Neutral:'rgba(124,106,255,.4)',Negative:'rgba(255,77,109,.55)'};const ds=Object.entries(g).map(([k,d])=>({label:k,data:d,backgroundColor:clr[k],pointRadius:3,pointHoverRadius:6}));if(hl)ds.push({label:'★ You',data:[{x:Math.log1p(parseFloat(hl.followers)||0),y:Math.log1p(parseFloat(hl.avg_like_count)||0),label:hl.account_username}],backgroundColor:'#ffd166',pointRadius:11,pointStyle:'star'});ch.current=new Chart(ref.current,{type:'scatter',data:{datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8888aa',font:{size:10}}},tooltip:{callbacks:{label:c=>`@${c.raw.label}`}}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888aa'},title:{display:true,text:'Follower count (log scale — bigger = more followers)',color:'#8888aa',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888aa'},title:{display:true,text:'Average likes per post (log scale)',color:'#8888aa',font:{size:10}}}}}});return()=>ch.current?.destroy();},[users,hl]);return <div className="cw-lg"><canvas ref={ref}/></div>;}

function MoodChart({users}){const ref=useRef();const ch=useRef();useEffect(()=>{if(!ref.current||!users?.length)return;ch.current?.destroy();const top=[...users].sort((a,b)=>(parseFloat(b.avg_like_count)||0)-(parseFloat(a.avg_like_count)||0)).slice(0,15);const vals=top.map(u=>+((parseFloat(u.avg_avg_cmt_vader_compound)||0)).toFixed(3));ch.current=new Chart(ref.current,{type:'bar',data:{labels:top.map(u=>'@'+u.account_username),datasets:[{label:'Audience sentiment',data:vals,backgroundColor:vals.map(v=>v>0.3?'rgba(0,229,160,.72)':v>0?'rgba(124,106,255,.6)':'rgba(255,77,109,.7)'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`Score: ${c.raw}  (range −1 negative to +1 positive)`}}},scales:{y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888aa'},title:{display:true,text:'Audience comment sentiment (−1 = very negative, +1 = very positive)',color:'#8888aa',font:{size:10}}},x:{grid:{display:false},ticks:{color:'#8888aa',font:{size:9},maxRotation:45}}}}});return()=>ch.current?.destroy();},[users]);return <div className="cw"><canvas ref={ref}/></div>;}

function TopTable({users,k,onSelect,sel}){const rows=useMemo(()=>[...users].sort((a,b)=>(parseFloat(b.avg_like_count)||0)-(parseFloat(a.avg_like_count)||0)).slice(0,k),[users,k]);if(!rows.length)return <div className="empty">No influencers found for this category.</div>;return(<div className="tscroll"><table><thead><tr><th>#</th><th>Influencer</th><th>Tier</th><th>Followers</th><th>Avg Likes</th><th>Peak Likes</th><th>Avg Comments</th><th>Hashtags</th><th>% Positive</th><th>% Neutral</th><th>% Negative</th><th>Audience</th></tr></thead><tbody>{rows.map((u,i)=>(<tr key={u.account_username} className={sel===u.account_username?'sel':''} onClick={()=>onSelect(u.account_username)}><td><Rank r={i+1}/></td><td><strong>@{u.account_username}</strong>{u.account_is_verified==='True'&&<span style={{color:'var(--pos)',marginLeft:4,fontSize:10}}>✓</span>}</td><td><Tier f={u.followers}/></td><td>{fN(u.followers)}</td><td style={{fontWeight:600}}>{fN(u.avg_like_count)}</td><td style={{color:'var(--gld)'}}>{fN(u.max_like_count)}</td><td>{fN(u.avg_comment_count)}</td><td>{(parseFloat(u.avg_cap_num_hashtags)||0).toFixed(1)}</td><td><span style={{color:'var(--pos)',fontWeight:700}}>{fP(u.avg_pct_positive_predicted)}</span></td><td><span style={{color:'var(--neu)',fontWeight:700}}>{fP(u.avg_pct_neutral_predicted)}</span></td><td><span style={{color:'var(--neg)',fontWeight:700}}>{fP(u.avg_pct_negative_predicted)}</span></td><td><Pill v={u.user_dominant_sentiment}/></td></tr>))}</tbody></table></div>);}

function SimUsersTable({username,simU,umap}){const rows=useMemo(()=>simU.filter(r=>r.user===username).slice(0,20),[simU,username]);if(!rows.length)return <div className="empty">No pre-computed similar influencers found for @{username}. This usually means the influencer has only 1 post in the dataset, making their content profile too short for reliable matching.</div>;return(<div className="tscroll"><table><thead><tr><th>#</th><th>Similar Influencer</th><th>Tier</th><th>Followers</th><th>Avg Likes</th><th>% Positive</th><th>% Neutral</th><th>Similarity ↑</th></tr></thead><tbody>{rows.map(r=>{const u=umap[r.similar_user]||{};const flw=u.followers||r.similar_followers||0;return(<tr key={r.similar_user} className="nc"><td><Rank r={+r.rank}/></td><td><strong>@{r.similar_user}</strong></td><td><Tier f={flw}/></td><td>{fN(flw)}</td><td>{fN(u.avg_like_count||0)}</td><td><span style={{color:'var(--pos)'}}>{fP(u.avg_pct_positive_predicted||0)}</span></td><td><span style={{color:'var(--neu)'}}>{fP(u.avg_pct_neutral_predicted||0)}</span></td><td><SBar v={r.score} max={0.6}/></td></tr>);})}</tbody></table></div>);}

function SimItemsTable({username,simI,umap}){const rows=useMemo(()=>simI.filter(r=>r.user===username).slice(0,10),[simI,username]);if(!rows.length)return <div className="empty">No recommended posts found for @{username}.</div>;return(<div className="tscroll"><table><thead><tr><th>#</th><th>Post By</th><th>Tier</th><th>Post Likes</th><th>% Positive</th><th>% Neutral</th><th>Relevance ↑</th><th>Caption Preview</th></tr></thead><tbody>{rows.map(r=>{const u=umap[r.post_owner]||{};return(<tr key={r.post_id} className="nc"><td><Rank r={+r.rank}/></td><td><strong>@{r.post_owner}</strong></td><td><Tier f={u.followers||0}/></td><td>{fN(r.like_count)}</td><td><span style={{color:'var(--pos)'}}>{fP(r.pct_positive_predicted)}</span></td><td><span style={{color:'var(--neu)'}}>{fP(u.avg_pct_neutral_predicted||0)}</span></td><td><SBar v={r.score} max={0.5}/></td><td style={{color:'var(--tx2)',maxWidth:240,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.caption_preview}>{r.caption_preview}</td></tr>);})}</tbody></table></div>);}

function InflDetail({user,catUsers,catMean,simU,simI,umap,onBack,backLabel}){const un=user.account_username;return(<div><br/>{onBack&&<button className="back-btn" onClick={onBack}>← {backLabel||'Back'}</button>}<div className="pcard"><div className="pav">{(un[0]||'?').toUpperCase()}</div><div><div className="pname">@{un}</div><div className="pmeta">{fN(user.followers)} followers · {fN(user.posts_total)} total posts on Instagram · <Tier f={user.followers}/></div><div className="ptags"><span className="tag cat">{ICO[user.category]||''} {cap(user.category)}</span>{user.account_is_verified==='True'&&<span className="tag ver">✓ Verified</span>}<span className="tag">{user.num_posts_in_dataset} post{user.num_posts_in_dataset!=='1'?'s':''} in dataset</span><span className="tag">Dominant: {user.user_dominant_sentiment}</span></div></div></div><div className="mgrp"><div className="mc d"><div className="mc-l">Followers</div><div className="mc-v" style={{color:'var(--gld)'}}>{fN(user.followers)}</div></div><div className="mc g"><div className="mc-l">Avg Likes / Post</div><div className="mc-v">{fN(user.avg_like_count)}</div><div className="mc-s">Peak {fN(user.max_like_count)}</div></div><div className="mc a"><div className="mc-l">Avg Comments / Post</div><div className="mc-v">{fN(user.avg_comment_count)}</div><div className="mc-s">Peak {fN(user.max_comment_count)}</div></div><div className="mc"><div className="mc-l">Avg Hashtags</div><div className="mc-v">{(parseFloat(user.avg_cap_num_hashtags)||0).toFixed(1)}</div></div><div className="mc"><div className="mc-l">Avg Caption Length</div><div className="mc-v">{(parseFloat(user.avg_cap_char_len)||0).toFixed(0)}</div><div className="mc-s">characters</div></div><div className="mc g"><div className="mc-l">% Positive Audience</div><div className="mc-v" style={{color:'var(--pos)'}}>{fP(user.avg_pct_positive_predicted)}</div></div><div className="mc nu"><div className="mc-l">% Neutral Audience</div><div className="mc-v" style={{color:'var(--neu)'}}>{fP(user.avg_pct_neutral_predicted)}</div></div><div className="mc p"><div className="mc-l">% Negative Audience</div><div className="mc-v" style={{color:'var(--neg)'}}>{fP(user.avg_pct_negative_predicted)}</div></div></div><div className="cg2"><div className="cc"><div className="cc-title">How does this influencer's audience feel?</div><div className="cc-sub">Predicted sentiment split across all posts' comments — positive (enthusiastic), neutral (questions/observations), negative (criticism)</div><DonutChart pos={parseFloat(user.avg_pct_positive_predicted)||0} neu={parseFloat(user.avg_pct_neutral_predicted)||0} neg={parseFloat(user.avg_pct_negative_predicted)||0}/></div><div className="cc"><div className="cc-title">How does this influencer post vs their peers?</div><div className="cc-sub">Caption style comparison against {cap(user.category)} category average — bars extending right mean above average on that dimension</div><StyleBar user={user} mean={catMean}/></div></div><div className="cg2"><div className="cc"><div className="cc-title">Where does this influencer sit among {cap(user.category)} peers?</div><div className="cc-sub">Each dot = one {cap(user.category)} influencer. ★ = this influencer. Dots in the top-left have high engagement relative to follower size.</div><ScatterChart users={catUsers} hl={user}/></div><div className="cc"><div className="cc-title">Is this influencer's audience more or less positive than typical?</div><div className="cc-sub">Distribution of % positive audience across all {cap(user.category)} influencers. Green bar = this influencer.</div><DistChart users={catUsers} hl={user}/></div></div><hr className="divider"/><div className="sec-h"><span className="sec-t">👥 Similar Influencers</span><span className="sec-s">Content theme similarity · {cap(user.category)}</span></div><div className="insight">Similarity is based on <strong>content topics</strong>, not popularity. Score = 60% caption vocabulary + 30% shared brand/place mentions + 10% audience tone alignment. Scores 0.30–0.55 = strong similarity for short social media text. Followers and likes shown as context only.</div><div className="tc"><div className="tc-head"><div><div className="tc-title">Top 20 Similar Influencers</div><div className="tc-sub">Popularity shown as context — not used in similarity ranking</div></div><div className="tc-badge">Personalised · {cap(user.category)}</div></div><SimUsersTable username={un} simU={simU} umap={umap}/></div><div className="sec-h"><span className="sec-t">📄 Recommended Posts</span><span className="sec-s">From other {cap(user.category)} influencers</span></div><div className="insight">Posts ranked by <strong>topic relevance</strong>, not likes. A 200-like post on the same specific topic scores higher than a viral off-topic post. Relevance = 60% caption vocabulary overlap + 40% shared brand/place entity mentions.</div><div className="tc"><div className="tc-head"><div><div className="tc-title">Top 10 Thematically Relevant Posts</div><div className="tc-sub">Post owner's tier and engagement shown as context</div></div><div className="tc-badge">Personalised</div></div><SimItemsTable username={un} simI={simI} umap={umap}/></div></div>);}

function CategoryExplorer({allUsers,cat,topK,simU,simI,umap}){
  const [sel,setSel]=useState(null);
  useEffect(()=>setSel(null),[cat]);
  const catUsers=useMemo(()=>allUsers.filter(u=>u.category===cat),[allUsers,cat]);
  const mean=useMemo(()=>meanOf(catUsers),[catUsers]);
  const selUser=sel?umap[sel]:null;
  if(sel&&selUser){const sCatUsers=allUsers.filter(u=>u.category===selUser.category);const sCatMean=meanOf(sCatUsers);return(<div className="page"><InflDetail user={selUser} catUsers={sCatUsers} catMean={sCatMean} simU={simU} simI={simI} umap={umap} onBack={()=>setSel(null)} backLabel={`Back to ${cap(cat)}`}/></div>);}
  const pPos=parseFloat(mean.avg_pct_positive_predicted)||0,pNeu=parseFloat(mean.avg_pct_neutral_predicted)||0,pNeg=parseFloat(mean.avg_pct_negative_predicted)||0;
  return(<div className="page"><div className="sec-h"><span className="sec-t">{ICO[cat]} {cap(cat)} Influencers</span><span className="sec-s">{catUsers.length.toLocaleString()} influencers in dataset</span></div><div className="mgrp"><div className="mc a"><div className="mc-l">Influencers</div><div className="mc-v">{catUsers.length.toLocaleString()}</div></div><div className="mc g"><div className="mc-l">Avg Likes / Post</div><div className="mc-v">{fN(mean.avg_like_count||0)}</div></div><div className="mc"><div className="mc-l">Avg Comments / Post</div><div className="mc-v">{fN(mean.avg_comment_count||0)}</div></div><div className="mc"><div className="mc-l">Avg Hashtags</div><div className="mc-v">{(parseFloat(mean.avg_cap_num_hashtags)||0).toFixed(1)}</div></div><div className="mc g"><div className="mc-l">Avg % Positive</div><div className="mc-v" style={{color:'var(--pos)'}}>{fP(pPos)}</div></div><div className="mc nu"><div className="mc-l">Avg % Neutral</div><div className="mc-v" style={{color:'var(--neu)'}}>{fP(pNeu)}</div></div><div className="mc p"><div className="mc-l">Avg % Negative</div><div className="mc-v" style={{color:'var(--neg)'}}>{fP(pNeg)}</div></div></div><div className="cg2"><div className="cc"><div className="cc-title">Follower count vs engagement quality</div><div className="cc-sub">Each dot = one influencer. Dots in top-left have high likes relative to followers — they punch above their weight. Colour = audience sentiment tone.</div><ScatterChart users={catUsers} hl={null}/></div><div className="cc"><div className="cc-title">How positive are audiences? — Top 15 most-liked</div><div className="cc-sub">Bar height = average audience comment sentiment. Green = positive, purple = neutral, red = negative. High likes do not always mean a happy audience.</div><MoodChart users={catUsers}/></div></div><div className="cg2"><div className="cc"><div className="cc-title">Spread of positive audience sentiment across {cap(cat)}</div><div className="cc-sub">How many influencers fall into each "% positive audience" bucket. A tall bar on the right means many influencers have very positive audiences.</div><DistChart users={catUsers} hl={null}/></div><div className="cc"><div className="cc-title">Overall {cap(cat)} audience sentiment mix</div><div className="cc-sub">Combined positive, neutral, and negative comment proportions across all {cap(cat)} influencers</div><div style={{paddingTop:16}}><DonutChart pos={pPos} neu={pNeu} neg={pNeg}/></div></div></div><div className="tc"><div className="tc-head"><div><div className="tc-title">Top {topK} {cap(cat)} Influencers</div><div className="tc-sub">Click any row to open that influencer's full profile</div></div><div className="tc-badge">Ranked by Avg Likes</div></div><TopTable users={catUsers} k={topK} onSelect={setSel} sel={sel}/></div></div>);}

function ProfileSearch({allUsers,cat,topK,simU,simI,umap,searched}){
  if(!searched)return(<div className="page"><div className="empty" style={{marginTop:60}}><div style={{fontSize:40,marginBottom:14}}>🔍</div><h3 style={{fontFamily:'Syne,sans-serif',marginBottom:10}}>Search for an Influencer</h3><p style={{color:'var(--tx2)',maxWidth:380,margin:'0 auto',lineHeight:1.7}}>Type a username in the sidebar and click <strong style={{color:'var(--acc)'}}>View Profile</strong> to see personalised charts, similar influencers, and recommended posts.</p><p style={{color:'var(--tx2)',marginTop:10,fontSize:12}}>Don't know a username? Switch to <strong style={{color:'var(--acc)'}}>Explore Categories</strong> to browse and click any influencer.</p></div></div>);
  const found=umap[searched];
  if(!found){const fu=allUsers.filter(u=>u.category===cat);const fm=meanOf(fu);const pPos=parseFloat(fm.avg_pct_positive_predicted)||0,pNeu=parseFloat(fm.avg_pct_neutral_predicted)||0,pNeg=parseFloat(fm.avg_pct_negative_predicted)||0;return(<div className="page"><div className="nf-box"><div style={{fontSize:36,marginBottom:10}}>🤷</div><div className="nf-title">@{searched} was not found</div><div className="nf-sub">This username is not in our dataset of {allUsers.length.toLocaleString()} influencers (Instagram 2013–2019).<br/>Showing general overview for <strong style={{color:'var(--gld)'}}>{cap(cat)}</strong> instead. Try another username or change category in the sidebar.</div></div><div className="sec-h"><span className="sec-t">{ICO[cat]} {cap(cat)} — General Overview</span></div><div className="mgrp"><div className="mc a"><div className="mc-l">Influencers</div><div className="mc-v">{fu.length.toLocaleString()}</div></div><div className="mc g"><div className="mc-l">Avg Likes / Post</div><div className="mc-v">{fN(fm.avg_like_count||0)}</div></div><div className="mc"><div className="mc-l">Avg Comments</div><div className="mc-v">{fN(fm.avg_comment_count||0)}</div></div><div className="mc g"><div className="mc-l">Avg % Positive</div><div className="mc-v" style={{color:'var(--pos)'}}>{fP(pPos)}</div></div><div className="mc nu"><div className="mc-l">Avg % Neutral</div><div className="mc-v" style={{color:'var(--neu)'}}>{fP(pNeu)}</div></div><div className="mc p"><div className="mc-l">Avg % Negative</div><div className="mc-v" style={{color:'var(--neg)'}}>{fP(pNeg)}</div></div></div><div className="cg2"><div className="cc"><div className="cc-title">Overall {cap(cat)} audience sentiment mix</div><div className="cc-sub">Combined sentiment across all influencers in this category</div><div style={{paddingTop:16}}><DonutChart pos={pPos} neu={pNeu} neg={pNeg}/></div></div><div className="cc"><div className="cc-title">Spread of positive audience sentiment</div><div className="cc-sub">Distribution of % positive audience across {cap(cat)} influencers</div><DistChart users={fu} hl={null}/></div></div><div className="tc"><div className="tc-head"><div className="tc-title">Top {topK} {cap(cat)} Influencers</div><div className="tc-badge">General</div></div><TopTable users={fu} k={topK} onSelect={()=>{}} sel={null}/></div></div>);}
  const uCat=found.category;const uCatUsers=allUsers.filter(u=>u.category===uCat);const uCatMean=meanOf(uCatUsers);
  return(<div className="page"><div className="st ok"><span className="dot"/><span>Profile found: <strong>@{searched}</strong> · {cap(uCat)} · <Tier f={found.followers}/></span></div><InflDetail user={found} catUsers={uCatUsers} catMean={uCatMean} simU={simU} simI={simI} umap={umap} onBack={null}/></div>);}

function HelpPage(){
  const metrics=[{ico:'❤️',col:'rgba(255,107,157,.15)',t:'Average Likes per Post',b:'Mean Instagram likes across all posts in our dataset. Primary engagement quality signal. Does not equal total likes — would unfairly penalise influencers with fewer posts in our dataset.',ex:'@bellahadid: 631K avg likes. @khloekardashian: 2M avg. High avg = consistently engaging content.'},{ico:'🏔️',col:'rgba(255,209,102,.15)',t:'Peak Likes',b:'The single highest-liked post. Reveals viral potential. Compare with avg likes to understand consistency vs occasional virality.',ex:'Avg 50K but peak 500K = one viral moment, not consistent performance. Avg 200K and peak 250K = very consistent.'},{ico:'💬',col:'rgba(0,229,160,.15)',t:'Average Comments per Post',b:'Mean official Instagram comment count per post. Comments require more effort than likes — higher counts signal stronger community engagement rather than passive scrolling.',ex:'100 comments on 1K likes = 10% engagement rate. 100 on 1M likes = 0.01% — very different audience relationships.'},{ico:'#️⃣',col:'rgba(124,106,255,.15)',t:'Hashtags per Post',b:'Average number of hashtags used. More hashtags increase discoverability but can feel less authentic. Varies significantly by category.',ex:'Beauty: ~18 avg. Fashion: ~12. Travel: ~8. Interior design: ~4. Context matters when comparing.'},{ico:'😊',col:'rgba(0,229,160,.15)',t:'% Positive Audience',b:'Fraction of comments predicted as Positive by our Linear SVM model — expressing enthusiasm, love, admiration, or support. Dataset average = 74%.',ex:'Above 85% = very warm community. 50–70% = mixed but healthy. Below 40% = significant controversy or audience tension.'},{ico:'😐',col:'rgba(124,106,255,.15)',t:'% Neutral Audience',b:'Comments that are neither positive nor negative — questions, information requests, or casual observations. A healthy neutral % means engaged, curious followers asking questions.',ex:'"Where is this from?" / "What camera do you use?" / "Tag the location" = typical neutral comments. Not bad — shows real engagement.'},{ico:'😠',col:'rgba(255,77,109,.15)',t:'% Negative Audience',b:'Comments expressing criticism, disappointment, or negativity. Higher % signals controversy, oversaturation, or audience trust issues. Even popular accounts can have high negative %.',ex:'Cara Delevingne: 1.28M avg likes but only 26% positive. High reach does not guarantee a happy audience.'},{ico:'🏷️',col:'rgba(255,209,102,.15)',t:'Influencer Tier',b:'Industry-standard size classification based on followers: Nano <10K, Micro 10K–100K, Macro 100K–1M, Mega 1M+. Nano and Micro often have higher engagement rates per follower despite smaller reach.',ex:'A Nano with 5K followers and 40% engagement rate may deliver better campaign ROI than a Mega at 0.05% engagement.'},{ico:'🎯',col:'rgba(124,106,255,.15)',t:'Similarity Score',b:'How similar two influencers are in content topics. 60% caption vocabulary, 30% shared brands/locations mentioned, 10% audience tone. Scores 0.30–0.55 = strong similarity for Instagram text. Looks lower than expected because captions are short (8–12 meaningful words after cleaning).',ex:'0.45 = very similar niche. 0.25 = same broad category, different sub-topic. Both are meaningful — the ranking matters more than the absolute score.'},{ico:'📊',col:'rgba(0,229,160,.15)',t:'Relevance Score (posts)',b:'How closely a post matches the searched influencer\'s content themes. 60% topic vocabulary + 40% shared entity mentions. High-liked posts score low if they are off-topic.',ex:'A 200-like sustainable fashion post is more relevant to a sustainable fashion influencer than a 500K-like celebrity gossip post.'},{ico:'📈',col:'rgba(124,106,255,.15)',t:'Caption Positivity Tone',b:'VADER sentiment score on caption text (−1 to +1). Independent rule-based measurement, not our classifier. Measures how positive the caption language is, not the audience reaction.',ex:'0.7 = very upbeat caption language. 0.0 = neutral/factual. Negative values are rare in influencer captions.'},{ico:'💭',col:'rgba(255,107,157,.15)',t:'Subjectivity',b:'TextBlob subjectivity score (0 = factual, 1 = opinionated). Factual: "This jacket is from Zara". Opinionated: "This jacket is the most stunning piece I own".',ex:'Recipe-focused food influencers tend toward 0. Opinion-heavy fashion and beauty influencers tend toward 0.7–0.9.'},{ico:'🤖',col:'rgba(0,229,160,.15)',t:'Model Performance',b:'Linear SVM trained on RoBERTa labels. F1 Macro = 0.77, agreement with RoBERTa = 89.3%. Rayaan\'s improvements: SMOTE oversampling 3×, character n-grams, expanded negative lexicon, threshold tuning (p≥0.30 for Negative). Post-level split prevents leakage.',ex:'F1 Negative = 0.57 — hardest class (only 2.6% of comments). SMOTE tripled Negative training samples to improve recall.'}];
  const charts=[{ico:'⚫',col:'rgba(124,106,255,.15)',t:'Follower count vs engagement quality (scatter)',b:'X-axis = follower count, Y-axis = avg likes per post — both log scale so Mega influencers don\'t squash everyone else. Colour = audience sentiment tone. Dots top-left = high engagement relative to follower size.',ex:'A Micro influencer in the top-left outperforms many Macro/Mega influencers on engagement quality. These are often better brand partnership candidates.'},{ico:'📊',col:'rgba(255,209,102,.15)',t:'How positive are audiences? (bar chart)',b:'Top 15 by likes. Bar height = average audience VADER sentiment score (−1 to +1). Y-axis explicitly labelled with the range. Green = positive, purple = neutral, red = negative.',ex:'Side-by-side bars reveal that two influencers with identical like counts can have opposite audience emotional responses — a crucial distinction for brand safety.'},{ico:'🟣',col:'rgba(0,229,160,.15)',t:'Spread of positive sentiment (histogram)',b:'X-axis = % positive audience. Y-axis = number of influencers in that bucket. Green bar = the influencer being viewed. Read as: "Compared to peers, is this influencer\'s audience unusually positive or negative?"',ex:'If the green bar is far right of the cluster, this influencer has an unusually enthusiastic audience. Far left = unusual controversy for this category.'},{ico:'🍩',col:'rgba(255,107,157,.15)',t:'Audience sentiment mix (donut)',b:'Positive/Neutral/Negative proportions for one influencer or the whole category. Large Neutral slice = engaged, curious audience asking questions. Large Negative = controversy or disappointment.',ex:'Category aggregate donut lets you compare audience warmth across niches. Beauty audiences tend to be warmer than fashion audiences on average.'},{ico:'↔️',col:'rgba(124,106,255,.15)',t:'Caption style comparison (horizontal bars)',b:'6 dimensions compared against category average. Purple = this influencer. Grey = category average. Right of grey = above average. Left = below average.',ex:'If Hashtags extends far right: heavy hashtag user. If Caption length is minimal: very short captions. Identifies distinctive posting styles at a glance.'}];
  return(<div className="page"><div className="sec-h"><span className="sec-t">❓ Help & Glossary</span></div><div className="insight">This dashboard analyses <strong>645,481 Instagram comments</strong> from <strong>45,564 posts</strong> by <strong>24,659 influencers</strong> (2013–2019). Sentiment predicted by a <strong>Linear SVM (F1 Macro = 0.77)</strong> trained on RoBERTa labels, with SMOTE oversampling and character n-grams. Influencer similarity is <strong>topic-based</strong> (TF-IDF on raw captions + NER entity overlap) — popularity is excluded by design. All results pre-computed offline.</div><div className="sec-h" style={{marginTop:8}}><span className="sec-t" style={{fontSize:15}}>📐 Metric Explanations</span></div><div className="help-grid">{metrics.map(it=>(<div className="hcard" key={it.t}><div className="hcard-t"><div className="hcard-ico" style={{background:it.col}}>{it.ico}</div>{it.t}</div><div className="hcard-body">{it.b}</div><div className="hcard-ex">{it.ex}</div></div>))}</div><div className="sec-h" style={{marginTop:8}}><span className="sec-t" style={{fontSize:15}}>📈 Understanding the Charts</span></div><div className="help-grid">{charts.map(it=>(<div className="hcard" key={it.t}><div className="hcard-t"><div className="hcard-ico" style={{background:it.col}}>{it.ico}</div>{it.t}</div><div className="hcard-body">{it.b}</div><div className="hcard-ex">{it.ex}</div></div>))}</div></div>);}

function App(){
  const [data,setData]=useState({users:[],simU:[],simI:[],posts:[]});
  const [loading,setLoading]=useState(true);
  const [loadErr,setLoadErr]=useState(null);
  const [input,setInput]=useState('');
  const [searched,setSearched]=useState('');
  const [cat,setCat]=useState('fashion');
  const [topK,setTopK]=useState(20);
  const [tab,setTab]=useState('explore');
  useEffect(()=>{(async()=>{try{const [users,simU,simI,posts]=await Promise.all([csv(URLS.users),csv(URLS.simU),csv(URLS.simI),csv(URLS.posts)]);users.forEach(u=>u.account_username=norm(u.account_username));simU.forEach(r=>{r.user=norm(r.user);r.similar_user=norm(r.similar_user);});simI.forEach(r=>{r.user=norm(r.user);r.post_owner=norm(r.post_owner);});posts.forEach(p=>p.account_username=norm(p.account_username));setData({users,simU,simI,posts});}catch(e){setLoadErr('Failed to load data from GitHub. Ensure the repo is public and all 4 CSV files are in the data/ folder.');}finally{setLoading(false);}})();},[]);
  const umap=useMemo(()=>{const m={};data.users.forEach(u=>m[u.account_username]=u);return m;},[data.users]);
  const doSearch=()=>{const v=norm(input);if(!v)return;setSearched(v);setTab('profile');const f=umap[v];if(f?.category&&CATS.includes(f.category))setCat(f.category);};
  if(loading)return(<div className="full-center"><div className="spinner"/><p style={{color:'var(--tx2)',fontWeight:500}}>Loading dashboard…</p><p style={{fontSize:11,color:'var(--tx3)'}}>Fetching ~92MB from GitHub · takes ~15–20 seconds on first load</p></div>);
  if(loadErr)return(<div className="full-center"><div style={{fontSize:40}}>⚠️</div><h2 style={{color:'var(--neg)',fontFamily:'Syne,sans-serif'}}>Data Load Error</h2><p style={{color:'var(--tx2)',maxWidth:480,textAlign:'center',lineHeight:1.7}}>{loadErr}</p></div>);
  const catCount=data.users.filter(u=>u.category===cat).length;
  return(<div className="app"><aside className="sidebar"><div className="logo"><div className="logo-icon">📊</div><div><div className="logo-name">Influencer</div><div className="logo-sub">Analytics</div></div></div><div style={{display:'flex',flexDirection:'column',gap:6}}><div className="s-lbl">Find Influencer</div><input className="si" placeholder="e.g. bellahadid" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()}/><button className="sbtn" onClick={doSearch}>View Profile →</button></div><div style={{display:'flex',flexDirection:'column',gap:6}}><div className="s-lbl">Category</div><div className="cg">{CATS.map(c=>(<button key={c} className={`cb ${cat===c?'on':''}`} onClick={()=>{setCat(c);if(tab!=='profile'&&tab!=='help')setTab('explore');}}>{ICO[c]} {cap(c)}</button>))}</div></div><div style={{display:'flex',flexDirection:'column',gap:4}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span className="s-lbl">Top-K Table</span><span className="tk-val">{topK}</span></div><input type="range" min={5} max={50} value={topK} onChange={e=>setTopK(+e.target.value)}/></div><div className="sfoot"><strong>Dataset</strong><br/>Instagram 2013–2019<br/>{data.users.length.toLocaleString()} influencers<br/>45,564 posts · 645K comments<br/><br/><strong>Classifier (v2)</strong><br/>Linear SVM · F1 Macro 0.77<br/>SMOTE + char n-grams<br/>F1 Negative = 0.57<br/><br/><strong>Similarity</strong><br/>TF-IDF on raw captions<br/>+ NER entity overlap<br/>Pre-computed offline</div></aside><div className="main-col"><nav className="nav"><button className={`ntab ${tab==='explore'?'on':''}`} onClick={()=>setTab('explore')}>🌐 Explore Categories</button><button className={`ntab ${tab==='profile'?'on':''}`} onClick={()=>setTab('profile')}>👤 Find Influencer</button><button className={`ntab ${tab==='help'?'on':''}`} onClick={()=>setTab('help')}>❓ Help & Glossary</button><div className="nav-right">{catCount.toLocaleString()} influencers · <strong style={{color:'var(--tx)',marginLeft:4}}>{cap(cat)}</strong></div></nav><div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column'}}>{tab==='explore'&&<CategoryExplorer allUsers={data.users} cat={cat} topK={topK} simU={data.simU} simI={data.simI} umap={umap}/>}{tab==='profile'&&<ProfileSearch allUsers={data.users} cat={cat} topK={topK} simU={data.simU} simI={data.simI} umap={umap} searched={searched}/>}{tab==='help'&&<HelpPage/>}</div></div></div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
