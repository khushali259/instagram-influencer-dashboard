<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Influencer Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07070d;--s1:#111118;--s2:#18181f;--s3:#202028;
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);
  --acc:#7c6aff;--a2:#ff6b9d;--a3:#00e5a0;
  --tx:#eeeef5;--tx2:#8888aa;--tx3:#44445a;
  --pos:#00e5a0;--neu:#7c6aff;--neg:#ff4d6d;--gld:#ffd166;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 60% at 15% -15%,rgba(124,106,255,.09),transparent 55%),
                   radial-gradient(ellipse 60% 50% at 85% 110%,rgba(255,107,157,.07),transparent 55%);}
h1,h2,h3,h4{font-family:'Syne',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px;}

/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:240px;min-width:240px;background:var(--s1);border-right:1px solid var(--b);
  padding:20px 16px;display:flex;flex-direction:column;gap:18px;
  position:sticky;top:0;height:100vh;overflow-y:auto;}
.main{flex:1;min-width:0;overflow:hidden;}

/* SIDEBAR */
.logo{display:flex;align-items:center;gap:9px;}
.logo-icon{width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),var(--a2));
  display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;line-height:1.1;}
.logo-sub{font-size:9px;color:var(--tx2);letter-spacing:2px;text-transform:uppercase;}
.s-lbl{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:5px;}
.s-sec{display:flex;flex-direction:column;}
.si{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:8px 11px;
  color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;
  width:100%;outline:none;transition:border-color .2s;}
.si:focus{border-color:var(--acc);}
.si::placeholder{color:var(--tx3);}
.sbtn{background:linear-gradient(135deg,var(--acc),var(--a2));border:none;border-radius:7px;
  padding:8px 0;color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;
  cursor:pointer;font-size:13px;width:100%;margin-top:6px;transition:opacity .2s;}
.sbtn:hover{opacity:.85;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.cb{padding:7px 4px;border-radius:6px;border:1px solid var(--b);background:transparent;
  color:var(--tx2);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;
  transition:all .15s;text-align:center;}
.cb:hover{border-color:var(--acc);color:var(--acc);}
.cb.on{background:rgba(124,106,255,.15);border-color:var(--acc);color:var(--acc);font-weight:600;}
.tk-row{display:flex;justify-content:space-between;}
.tk-val{color:var(--acc);font-weight:700;font-size:14px;}
input[type=range]{width:100%;accent-color:var(--acc);margin-top:5px;}
.sfoot{margin-top:auto;padding:11px 12px;background:var(--s2);border-radius:9px;
  font-size:11px;color:var(--tx2);line-height:1.8;border:1px solid var(--b);}
.sfoot strong{color:var(--tx);}

/* MAIN NAV TABS */
.nav{display:flex;border-bottom:1px solid var(--b);background:var(--s1);padding:0 28px;}
.ntab{padding:14px 16px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;
  border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.ntab:hover{color:var(--tx);}
.ntab.on{color:var(--acc);border-bottom-color:var(--acc);}

/* CONTENT AREA */
.page{padding:24px 28px;max-width:1400px;}

/* STATUS BARS */
.st{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:18px;}
.st.ok {background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.2);color:var(--pos);}
.st.warn{background:rgba(255,209,102,.07);border:1px solid rgba(255,209,102,.2);color:var(--gld);}
.st.info{background:rgba(124,106,255,.07);border:1px solid rgba(124,106,255,.2);color:var(--acc);}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* METRIC GRID */
.mgrp{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.mc{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:14px 15px;}
.mc.a{border-color:rgba(124,106,255,.3);background:rgba(124,106,255,.05);}
.mc.g{border-color:rgba(0,229,160,.3);background:rgba(0,229,160,.04);}
.mc.p{border-color:rgba(255,107,157,.3);background:rgba(255,107,157,.04);}
.mc.d{border-color:rgba(255,209,102,.3);background:rgba(255,209,102,.04);}
.mc-l{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}
.mc-v{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
.mc-s{font-size:10px;color:var(--tx2);margin-top:3px;}

/* CHARTS */
.cg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:20px;}
.cc{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:16px 18px;}
.cc-t{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:12px;}
.cw{position:relative;height:200px;}
.cw-sm{position:relative;height:160px;}
.cw-lg{position:relative;height:250px;}

/* SECTION */
.sec-h{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;}
.sec-t{font-size:18px;font-weight:700;}
.sec-s{font-size:12px;color:var(--tx2);}
.divider{border:none;border-top:1px solid var(--b);margin:22px 0;}

/* TABLE */
.tc{background:var(--s1);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.th2{padding:12px 16px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;}
.tt{font-size:14px;font-weight:700;}
.tbdg{font-size:9px;padding:3px 8px;border-radius:20px;background:rgba(124,106,255,.15);color:var(--acc);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.tsc{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:8px 14px;text-align:left;font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px;
  border-bottom:1px solid var(--b);background:var(--s2);font-weight:700;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--b);transition:background .12s;cursor:pointer;}
tbody tr:hover{background:var(--s2);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:9px 14px;font-size:12px;}

/* CLICKABLE ROW HIGHLIGHT */
tbody tr.selected{background:rgba(124,106,255,.1);}

/* SENTIMENT PILL */
.sp{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.sp.Positive{background:rgba(0,229,160,.15);color:var(--pos);}
.sp.Neutral{background:rgba(124,106,255,.15);color:var(--neu);}
.sp.Negative{background:rgba(255,77,109,.15);color:var(--neg);}

/* SCORE BAR */
.sbar{display:flex;align-items:center;gap:6px;}
.sb{height:3px;border-radius:2px;background:rgba(124,106,255,.2);flex:1;}
.sbf{height:100%;border-radius:2px;background:var(--acc);}
.sn{font-size:10px;color:var(--tx2);min-width:32px;text-align:right;}

/* RANK */
.rk{width:21px;height:21px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--s2);}
.rk.r1{background:rgba(255,209,102,.2);color:var(--gld);}
.rk.r2{background:rgba(200,200,200,.12);color:#bbb;}
.rk.r3{background:rgba(205,127,50,.14);color:#cd7f32;}

/* PROFILE CARD */
.pcard{background:linear-gradient(135deg,var(--s1),rgba(124,106,255,.06));
  border:1px solid rgba(124,106,255,.2);border-radius:14px;padding:20px;
  margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.pav{width:52px;height:52px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),var(--a2));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.pname{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;}
.pmeta{font-size:11px;color:var(--tx2);margin-top:3px;}
.ptags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--s2);color:var(--tx2);border:1px solid var(--b);}
.tag.cat{background:rgba(124,106,255,.1);color:var(--acc);border-color:rgba(124,106,255,.3);}
.tag.ver{background:rgba(0,229,160,.1);color:var(--pos);border-color:rgba(0,229,160,.3);}

/* EMPTY / LOADING */
.empty{padding:50px;text-align:center;color:var(--tx2);}
.spinner{width:32px;height:32px;border:3px solid var(--b);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;}

/* HELP SECTION */
.help-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:20px;}
.hcard{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:16px 18px;}
.hcard-t{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.hcard-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.hcard-body{font-size:12px;color:var(--tx2);line-height:1.7;}
.hcard-body strong{color:var(--tx);}
.hcard-ex{margin-top:8px;font-size:11px;padding:7px 10px;background:var(--s2);border-radius:6px;color:var(--tx2);border-left:2px solid var(--acc);}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:20px;}
.donut-legend{display:flex;flex-direction:column;gap:7px;}
.dl-item{display:flex;align-items:center;gap:7px;font-size:11px;}
.dl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* CATEGORY OVERVIEW HEADER */
.cat-overview-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}

/* BACK BUTTON */
.back-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:7px;
  border:1px solid var(--b);background:transparent;color:var(--tx2);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:12px;transition:all .15s;}
.back-btn:hover{border-color:var(--acc);color:var(--acc);}

/* INSIGHTS BOX */
.insight{background:rgba(124,106,255,.06);border:1px solid rgba(124,106,255,.15);
  border-radius:10px;padding:13px 16px;margin-bottom:20px;font-size:12px;color:var(--tx2);line-height:1.7;}
.insight strong{color:var(--acc);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

const BASE='https://raw.githubusercontent.com/khushali259/instagram-influencer-dashboard/main/data';
const URLS={
  users:`${BASE}/user_vectors_v2.csv`,
  simU :`${BASE}/user_similarity_topk.csv`,
  simI :`${BASE}/user_item_topk.csv`,
  posts:`${BASE}/post_vectors_slim.csv`,
};

const CATS=['beauty','family','fashion','fitness','food','interior','other','pet','travel'];
const ICO={beauty:'💄',family:'👨‍👩‍👧',fashion:'👗',fitness:'💪',food:'🍜',interior:'🏠',other:'✨',pet:'🐾',travel:'✈️'};
const fN=n=>{n=parseFloat(n)||0;if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.round(n).toLocaleString();};
const fP=n=>((parseFloat(n)||0)*100).toFixed(1)+'%';
const fS=n=>(parseFloat(n)||0).toFixed(3);
const cap=s=>s?s[0].toUpperCase()+s.slice(1):'';
const norm=s=>(s||'').toLowerCase().trim();
const csv=url=>new Promise((res,rej)=>Papa.parse(url,{download:true,header:true,skipEmptyLines:true,complete:r=>res(r.data),error:rej}));

// ── Helpers
const Rank=({r})=><span className={`rk ${r===1?'r1':r===2?'r2':r===3?'r3':''}`}>{r}</span>;
const Pill=({v})=><span className={`sp ${v}`}>{v}</span>;
const SBar=({v,max=0.6})=>{const p=Math.min(100,(parseFloat(v)||0)/max*100);return <div className="sbar"><div className="sb"><div className="sbf" style={{width:p+'%'}}/></div><span className="sn">{fS(v)}</span></div>;};

// ── Chart: Donut for sentiment breakdown
function DonutChart({pos,neu,neg}){
  const ref=useRef(null);const ch=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(ch.current)ch.current.destroy();
    ch.current=new Chart(ref.current,{type:'doughnut',data:{
      labels:['Positive','Neutral','Negative'],
      datasets:[{data:[pos*100,neu*100,neg*100],backgroundColor:['rgba(0,229,160,.8)','rgba(124,106,255,.7)','rgba(255,77,109,.8)'],borderWidth:0,hoverOffset:4}]
    },options:{responsive:true,maintainAspectRatio:false,cutout:'70%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw.toFixed(1)}%`}}}}});
    return()=>{if(ch.current)ch.current.destroy();};
  },[pos,neu,neg]);
  return(
    <div className="donut-wrap">
      <div style={{width:110,height:110,flexShrink:0,position:'relative'}}><canvas ref={ref}/></div>
      <div className="donut-legend">
        <div className="dl-item"><div className="dl-dot" style={{background:'var(--pos)'}}/><span style={{color:'var(--tx2)'}}>Positive</span><strong style={{marginLeft:'auto',paddingLeft:8,color:'var(--pos)'}}>{fP(pos)}</strong></div>
        <div className="dl-item"><div className="dl-dot" style={{background:'var(--neu)'}}/><span style={{color:'var(--tx2)'}}>Neutral</span><strong style={{marginLeft:'auto',paddingLeft:8,color:'var(--neu)'}}>{fP(neu)}</strong></div>
        <div className="dl-item"><div className="dl-dot" style={{background:'var(--neg)'}}/><span style={{color:'var(--tx2)'}}>Negative</span><strong style={{marginLeft:'auto',paddingLeft:8,color:'var(--neg)'}}>{fP(neg)}</strong></div>
      </div>
    </div>
  );
}

// ── Chart: Horizontal bar for caption style comparison
function StyleBar({user,mean}){
  const ref=useRef(null);const ch=useRef(null);
  useEffect(()=>{
    if(!ref.current||!user||!mean)return;
    if(ch.current)ch.current.destroy();
    const ms=[
      {l:'Hashtags/post',   k:'avg_cap_num_hashtags',   s:1},
      {l:'Mentions/post',   k:'avg_cap_num_mentions',   s:1},
      {l:'Exclamations',    k:'avg_cap_num_exclamation', s:1},
      {l:'Caption (÷10)',   k:'avg_cap_char_len',        s:.1},
      {l:'Pos. tone×10',    k:'avg_cap_vader_compound',  s:10},
      {l:'Subjectivity×10', k:'avg_cap_tb_subjectivity', s:10},
    ];
    ch.current=new Chart(ref.current,{type:'bar',data:{
      labels:ms.map(m=>m.l),
      datasets:[
        {label:`@${user.account_username}`,data:ms.map(m=>(parseFloat(user[m.k])||0)*m.s),backgroundColor:'rgba(124,106,255,.75)',borderRadius:4},
        {label:'Category avg',              data:ms.map(m=>(parseFloat(mean[m.k])||0)*m.s),backgroundColor:'rgba(255,255,255,.1)',borderRadius:4},
      ]
    },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#8888aa',font:{size:10}}}},
      scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888aa'}},
              y:{grid:{display:false},ticks:{color:'#8888aa',font:{size:10}}}}}});
    return()=>{if(ch.current)ch.current.destroy();};
  },[user,mean]);
  return <div className="cw"><canvas ref={ref}/></div>;
}

// ── Chart: Distribution histogram
function DistChart({users,hl}){
  const ref=useRef(null);const ch=useRef(null);
  useEffect(()=>{
    if(!ref.current||!users?.length)return;
    if(ch.current)ch.current.destroy();
    const B=20,step=1/B;
    const counts=Array(B).fill(0);
    const clr=Array(B).fill('rgba(124,106,255,.5)');
    users.forEach(u=>{const i=Math.min(B-1,Math.floor((parseFloat(u.avg_pct_positive_predicted)||0)/step));counts[i]++;});
    if(hl){const i=Math.min(B-1,Math.floor((parseFloat(hl.avg_pct_positive_predicted)||0)/step));clr[i]='rgba(0,229,160,.9)';}
    ch.current=new Chart(ref.current,{type:'bar',data:{
      labels:Array.from({length:B},(_,i)=>(i*step*100).toFixed(0)+'%'),
      datasets:[{data:counts,backgroundColor:clr,borderRadius:3}]
    },options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} influencers`}}},
      scales:{y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888aa'}},
              x:{grid:{display:false},ticks:{color:'#8888aa',maxTicksLimit:6}}}}});
    return()=>{if(ch.current)ch.current.destroy();};
  },[users,hl]);
  return <div className="cw"><canvas ref={ref}/></div>;
}

// ── Chart: Scatter
function ScatterChart({users,hl}){
  const ref=useRef(null);const ch=useRef(null);
  useEffect(()=>{
    if(!ref.current||!users?.length)return;
    if(ch.current)ch.current.destroy();
    const g={Positive:[],Neutral:[],Negative:[]};
    users.forEach(u=>{const s=u.user_dominant_sentiment||'Neutral';if(g[s])g[s].push({x:Math.log1p(parseFloat(u.followers)||0),y:Math.log1p(parseFloat(u.avg_like_count)||0),label:u.account_username});});
    const clr={Positive:'rgba(0,229,160,.5)',Neutral:'rgba(124,106,255,.4)',Negative:'rgba(255,77,109,.55)'};
    const ds=Object.entries(g).map(([k,d])=>({label:k,data:d,backgroundColor:clr[k],pointRadius:3,pointHoverRadius:6}));
    if(hl)ds.push({label:`@${hl.account_username}`,data:[{x:Math.log1p(parseFloat(hl.followers)||0),y:Math.log1p(parseFloat(hl.avg_like_count)||0),label:hl.account_username}],backgroundColor:'#ffd166',pointRadius:10,pointStyle:'star'});
    ch.current=new Chart(ref.current,{type:'scatter',data:{datasets:ds},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#8888aa',font:{size:10}}},tooltip:{callbacks:{label:c=>`@${c.raw.label}`}}},
      scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888aa'},title:{display:true,text:'Followers (log)',color:'#8888aa',font:{size:10}}},
              y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888aa'},title:{display:true,text:'Avg Likes (log)',color:'#8888aa',font:{size:10}}}}}});
    return()=>{if(ch.current)ch.current.destroy();};
  },[users,hl]);
  return <div className="cw-lg"><canvas ref={ref}/></div>;
}

// ── Chart: Line chart for audience VADER across category top 15
function AudienceMoodChart({users}){
  const ref=useRef(null);const ch=useRef(null);
  useEffect(()=>{
    if(!ref.current||!users?.length)return;
    if(ch.current)ch.current.destroy();
    const top=[...users].sort((a,b)=>(parseFloat(b.avg_like_count)||0)-(parseFloat(a.avg_like_count)||0)).slice(0,15);
    ch.current=new Chart(ref.current,{type:'bar',data:{
      labels:top.map(u=>'@'+u.account_username),
      datasets:[
        {label:'Avg audience VADER',data:top.map(u=>(parseFloat(u.avg_avg_cmt_vader_compound)||0).toFixed(3)),backgroundColor:top.map(u=>{const v=parseFloat(u.avg_avg_cmt_vader_compound)||0;return v>0.3?'rgba(0,229,160,.7)':v>0?'rgba(124,106,255,.6)':'rgba(255,77,109,.7)';}),borderRadius:4},
      ]
    },options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`VADER: ${c.raw} (−1 very negative → +1 very positive)`}}},
      scales:{y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8888aa'},title:{display:true,text:'VADER compound',color:'#8888aa',font:{size:10}}},
              x:{grid:{display:false},ticks:{color:'#8888aa',font:{size:9},maxRotation:45}}}}});
    return()=>{if(ch.current)ch.current.destroy();};
  },[users]);
  return <div className="cw"><canvas ref={ref}/></div>;
}

// ── Influencer table
function InfluencerTable({users,k,onSelect,selectedUser}){
  const rows=useMemo(()=>[...users].sort((a,b)=>(parseFloat(b.avg_like_count)||0)-(parseFloat(a.avg_like_count)||0)).slice(0,k),[users,k]);
  if(!rows.length)return <div className="empty">No influencers found for this category.</div>;
  return(
    <div className="tsc"><table>
      <thead><tr>
        <th>#</th><th>Influencer</th><th>Followers</th><th>Avg Likes</th>
        <th>Peak Likes</th><th>Avg Comments</th><th>Hashtags</th>
        <th>% Positive</th><th>% Negative</th><th>Audience</th>
      </tr></thead>
      <tbody>{rows.map((u,i)=>(
        <tr key={u.account_username}
            className={selectedUser===u.account_username?'selected':''}
            onClick={()=>onSelect(u.account_username)}>
          <td><Rank r={i+1}/></td>
          <td><strong>@{u.account_username}</strong>{u.account_is_verified==='True'&&<span style={{color:'var(--pos)',marginLeft:4,fontSize:10}}>✓</span>}</td>
          <td>{fN(u.followers)}</td>
          <td style={{fontWeight:600}}>{fN(u.avg_like_count)}</td>
          <td style={{color:'var(--gld)'}}>{fN(u.max_like_count)}</td>
          <td>{fN(u.avg_comment_count)}</td>
          <td>{(parseFloat(u.avg_cap_num_hashtags)||0).toFixed(1)}</td>

          <td><span style={{color:'var(--neg)',fontWeight:700}}>{fP(u.avg_pct_negative_predicted)}</span></td>

// ── Similar users table
function SimUsersTable({username,simU,umap}){
  const rows=useMemo(()=>simU.filter(r=>r.user===username).slice(0,20),[simU,username]);
  if(!rows.length)return <div className="empty">No pre-computed similar users (requires ≥2 posts in dataset).</div>;
  return(
    <div className="tsc"><table>
      <thead><tr><th>#</th><th>Influencer</th><th>Similarity</th><th>Followers</th><th>Avg Likes</th><th>% Positive</th><th>Topic</th><th>NER</th></tr></thead>
      <tbody>{rows.map(r=>{const u=umap[r.similar_user]||{};return(
        <tr key={r.similar_user}>
          <td><Rank r={+r.rank}/></td>
          <td><strong>@{r.similar_user}</strong></td>
          <td><SBar v={r.score} max={0.6}/></td>
          <td>{fN(u.followers||r.similar_followers||0)}</td>
          <td>{fN(u.avg_like_count||0)}</td>
          <td><span style={{color:'var(--pos)'}}>{fP(u.avg_pct_positive_predicted||0)}</span></td>
          <td style={{color:'var(--acc)'}}>{fS(r.tfidf_component)}</td>
          <td style={{color:'var(--a2)'}}>{fS(r.ner_component)}</td>
        </tr>);})}
      </tbody>
    </table></div>
  );
}

// ── Recommended posts table
function SimItemsTable({username,simI}){

// CATEGORY PAGE
// ══════════════════════════════════════════════════════════════════════════
function CategoryPage({users,cat,topK,simU,simI,umap,searchedUser}){
  const [selected,setSelected]=useState(null);
  const catUsers=useMemo(()=>users.filter(u=>u.category===cat),[users,cat]);
  const catMean=useMemo(()=>{
    if(!catUsers.length)return{};
    const ks=Object.keys(catUsers[0]).filter(k=>!isNaN(parseFloat(catUsers[0][k])));
    const m={};
    ks.forEach(k=>m[k]=(catUsers.reduce((s,u)=>s+(parseFloat(u[k])||0),0)/catUsers.length).toString());
    return m;
  },[catUsers]);

  const selectedUser=selected?umap[selected]:null;

  // If a searched user is found and is in this category, auto-expand their detail
  useEffect(()=>{
    if(searchedUser&&umap[searchedUser]&&umap[searchedUser].category===cat){
      setSelected(searchedUser);
    }
  },[searchedUser,cat]);

  if(selected&&selectedUser){
    return <InfluencerDetail user={selectedUser} catUsers={catUsers} catMean={catMean}
             simU={simU} simI={simI} umap={umap} onBack={()=>setSelected(null)}/>;
  }

  return(
    <div className="page">
      <div className="cat-overview-head">
        <div className="sec-h" style={{marginBottom:0}}>
          <span className="sec-t">{ICO[cat]} {cap(cat)} Influencers</span>
          <span className="sec-s">{catUsers.length.toLocaleString()} in dataset</span>
        </div>
      </div>

      {/* Category summary metrics */}
      <div className="mgrp">
        <div className="mc a"><div className="mc-l">Influencers</div><div className="mc-v">{catUsers.length.toLocaleString()}</div></div>
        <div className="mc g"><div className="mc-l">Avg Likes/Post</div><div className="mc-v">{fN(catMean.avg_like_count||0)}</div></div>
        <div className="mc"><div className="mc-l">Avg Comments/Post</div><div className="mc-v">{fN(catMean.avg_comment_count||0)}</div></div>
        <div className="mc"><div className="mc-l">Avg Hashtags</div><div className="mc-v">{(parseFloat(catMean.avg_cap_num_hashtags)||0).toFixed(1)}</div></div>
        <div className="mc g"><div className="mc-l">Avg % Positive</div><div className="mc-v" style={{color:'var(--pos)'}}>{fP(catMean.avg_pct_positive_predicted||0)}</div></div>
        <div className="mc p"><div className="mc-l">Avg % Negative</div><div className="mc-v" style={{color:'var(--neg)'}}>{fP(catMean.avg_pct_negative_predicted||0)}</div></div>
      </div>

      {/* Charts */}
      <div className="cg2">
        <div className="cc">
          <div className="cc-t">Followers vs Avg Likes (log scale) — coloured by audience sentiment</div>
          <ScatterChart users={catUsers} hl={null}/>
        </div>
        <div className="cc">
          <div className="cc-t">Audience VADER mood — top 15 by likes (green = positive, purple = neutral, red = negative)</div>
          <AudienceMoodChart users={catUsers}/>
        </div>
      </div>
      <div className="cg2">
        <div className="cc">
          <div className="cc-t">Distribution of % Positive Audience across {cap(cat)}</div>
          <DistChart users={catUsers} hl={null}/>
        </div>
        <div className="cc">
          <div className="cc-t">Category Audience Sentiment (aggregate)</div>
          <div style={{paddingTop:20}}>
            <DonutChart pos={parseFloat(catMean.avg_pct_positive_predicted)||0}
                        neu={parseFloat(catMean.avg_pct_neutral_predicted)||0}
                        neg={parseFloat(catMean.avg_pct_negative_predicted)||0}/>
          </div>
        </div>
      </div>

      {/* Table */}
      <div className="tc">
        <div className="th2">
          <div className="tt">Top {topK} — {cap(cat)}</div>
          <div className="tbdg">Click a row to explore</div>
        </div>
        <InfluencerTable users={catUsers} k={topK} onSelect={setSelected} selectedUser={selected}/>
      </div>
      <p style={{fontSize:11,color:'var(--tx2)',marginTop:-14,paddingLeft:16}}>

      </p>

  );
}

function SearchPage({users,cat,topK,simU,simI,umap,searchedUser}){
  const found=searchedUser?umap[searchedUser]:null;
  const catUsers=useMemo(()=>users.filter(u=>u.category===cat),[users,cat]);
  const catMean=useMemo(()=>{
    if(!catUsers.length)return{};
    const ks=Object.keys(catUsers[0]).filter(k=>!isNaN(parseFloat(catUsers[0][k])));
    const m={};ks.forEach(k=>m[k]=(catUsers.reduce((s,u)=>s+(parseFloat(u[k])||0),0)/catUsers.length).toString());
    return m;
  },[catUsers]);

  if(!searchedUser){
    return(

        <div className="sec-h"><span className="sec-t">{ICO[cat]} General — {cap(cat)}</span></div>
        <div className="mgrp">
          <div className="mc g"><div className="mc-l">Category Avg Likes</div><div className="mc-v">{fN(catMean.avg_like_count||0)}</div></div>
          <div className="mc"><div className="mc-l">Avg Comments</div><div className="mc-v">{fN(catMean.avg_comment_count||0)}</div></div>
          <div className="mc"><div className="mc-l">Avg Hashtags</div><div className="mc-v">{(parseFloat(catMean.avg_cap_num_hashtags)||0).toFixed(1)}</div></div>
          <div className="mc g"><div className="mc-l">Avg % Positive</div><div className="mc-v" style={{color:'var(--pos)'}}>{fP(catMean.avg_pct_positive_predicted||0)}</div></div>
        </div>
        <div className="cg2">
          <div className="cc"><div className="cc-t">Category Audience Sentiment</div><div style={{paddingTop:20}}><DonutChart pos={parseFloat(catMean.avg_pct_positive_predicted)||0} neu={parseFloat(catMean.avg_pct_neutral_predicted)||0} neg={parseFloat(catMean.avg_pct_negative_predicted)||0}/></div></div>
          <div className="cc"><div className="cc-t">Distribution of Positive Sentiment in {cap(cat)}</div><DistChart users={catUsers} hl={null}/></div>
        </div>
        <div className="tc"><div className="th2"><div className="tt">Top {topK} — {cap(cat)}</div><div className="tbdg">General</div></div><InfluencerTable users={catUsers} k={topK} onSelect={()=>{}} selectedUser={null}/></div>
      </div>
    );
  }

  const userCatUsers=users.filter(u=>u.category===found.category);
  const userCatMean=useMemo(()=>{
    if(!userCatUsers.length)return{};
    const ks=Object.keys(userCatUsers[0]).filter(k=>!isNaN(parseFloat(userCatUsers[0][k])));
    const m={};ks.forEach(k=>m[k]=(userCatUsers.reduce((s,u)=>s+(parseFloat(u[k])||0),0)/userCatUsers.length).toString());
    return m;
  },[userCatUsers]);

  return(
    <div className="page">
      <div className="st ok"><span className="dot"/><span>Profile found: <strong>@{searchedUser}</strong> · {cap(found.category)}</span></div>
      <InfluencerDetail user={found} catUsers={userCatUsers} catMean={userCatMean}
        simU={simU} simI={simI} umap={umap} onBack={()=>{}}/>
    </div>
  );
}

  const [topK,setTopK]=useState(20);
  const [tab,setTab]=useState('fashion');

  useEffect(()=>{
    (async()=>{
      try{
        const [users,simU,simI,posts]=await Promise.all([csv(URLS.users),csv(URLS.simU),csv(URLS.simI),csv(URLS.posts)]);
        users.forEach(u=>u.account_username=norm(u.account_username));
        simU.forEach(r=>{r.user=norm(r.user);r.similar_user=norm(r.similar_user);});
        simI.forEach(r=>{r.user=norm(r.user);r.post_owner=norm(r.post_owner);});
        posts.forEach(p=>p.account_username=norm(p.account_username));
        setData({users,simU,simI,posts});
      }catch(e){setErr('Failed to load data from GitHub. Ensure repo is public and files are uploaded.');}
      finally{setLoading(false);}
    })();
  },[]);

  const umap=useMemo(()=>{const m={};data.users.forEach(u=>m[u.account_username]=u);return m;},[data.users]);

  const search=()=>{
    const v=norm(input);
    setSearched(v);
    if(v){
      const found=umap[v];
      if(found){setCat(found.category);setTab('search');}
      else setTab('search');
    }
  };

  if(loading)return(
    <div className="center">
      <div className="spinner"/>
      <p style={{color:'var(--tx2)',fontWeight:500}}>Loading dashboard…</p>
      <p style={{fontSize:11,color:'var(--tx2)'}}>Fetching ~90MB from GitHub</p>
    </div>
  );
  if(err)return(
    <div className="center">
      <div style={{fontSize:40}}>⚠️</div>
      <h2 style={{color:'var(--neg)'}}>Load Error</h2>
      <p style={{color:'var(--tx2)',maxWidth:460,textAlign:'center',lineHeight:1.7}}>{err}</p>
    </div>
  );

  const navTabs=[...CATS.map(c=>({id:c,label:`${ICO[c]} ${cap(c)}`})),{id:'search',label:'👤 Profile'},{id:'help',label:'❓ Help'}];

  return(
    <div className="app">
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div className="logo">
          <div className="logo-icon">📊</div>
          <div><div className="logo-name">Influencer</div><div className="logo-sub">Analytics</div></div>
        </div>

        <div className="s-sec">
          <div className="s-lbl">Search Username</div>
          <input className="si" placeholder="e.g. bellahadid" value={input}
            onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&search()}/>
          <button className="sbtn" onClick={search}>View Profile</button>
        </div>

        <div className="s-sec">
          <div className="s-lbl">Category</div>
          <div className="cg">
            {CATS.map(c=>(
              <button key={c} className={`cb ${cat===c&&tab!=='search'&&tab!=='help'?'on':''}`}
                onClick={()=>{setCat(c);setTab(c);}}>
                {ICO[c]} {cap(c)}
              </button>
            ))}
          </div>
        </div>

        <div className="s-sec">
          <div className="tk-row">
            <span className="s-lbl">Top-K Table</span>
            <span className="tk-val">{topK}</span>
          </div>
          <input type="range" min={5} max={50} value={topK} onChange={e=>setTopK(+e.target.value)}/>
        </div>

        <div className="sfoot">
          <strong>Dataset</strong><br/>
          Instagram 2013–2019<br/>
          {data.users.length.toLocaleString()} influencers<br/>
          45,564 posts · 645K comments<br/><br/>
          <strong>Classifier</strong><br/>
          Linear SVM · F1 = 0.73<br/>
          Post-level split · no leakage<br/><br/>
          <strong>Similarity</strong><br/>
          TF-IDF + NER · pre-computed
        </div>
      </aside>

      {/* MAIN */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        {/* TOP NAV */}
        <nav className="nav">
          {navTabs.map(t=>(
            <button key={t.id} className={`ntab ${tab===t.id?'on':''}`}
              onClick={()=>{setTab(t.id);if(CATS.includes(t.id))setCat(t.id);}}>
              {t.label}
            </button>
          ))}
        </nav>

        {/* PAGE CONTENT */}
        {tab==='help'&&<HelpPage/>}
        {tab==='search'&&<SearchPage users={data.users} cat={cat} topK={topK} simU={data.simU} simI={data.simI} umap={umap} searchedUser={searched}/>}
        {CATS.includes(tab)&&<CategoryPage users={data.users} cat={tab} topK={topK} simU={data.simU} simI={data.simI} umap={umap} searchedUser={searched}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
